<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Verificación de identidad - Banco Falabella Premio</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      background: #f8f9fa;
      color: #222;
    }
    .container {
      max-width: 640px;
      margin: 40px auto;
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 12px 50px rgba(0,0,0,0.18);
    }
    .header {
      background: linear-gradient(135deg, #c8102e, #8f0a1e);
      color: white;
      padding: 50px 25px 35px;
      text-align: center;
    }
    .header h1 {
      margin: 0;
      font-size: 2.4rem;
    }
    .header p {
      font-size: 1.35rem;
      margin: 12px 0 0;
      opacity: 0.95;
    }
    .content {
      padding: 35px 28px;
    }
    .form-group {
      margin-bottom: 24px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      font-size: 1.05rem;
    }
    input, select {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 1.1rem;
      box-sizing: border-box;
    }
    .row {
      display: flex;
      gap: 20px;
    }
    .row > div {
      flex: 1;
    }
    .fake-submit {
      background: #00aa00;
      color: white;
      font-size: 1.45rem;
      font-weight: bold;
      padding: 18px 0;
      border: none;
      border-radius: 50px;
      width: 100%;
      margin: 32px 0 20px;
      cursor: pointer;
      box-shadow: 0 6px 0 #008800;
      transition: all 0.12s;
    }
    .fake-submit:active {
      transform: translateY(3px);
      box-shadow: 0 3px 0 #006600;
    }
    .security-badges {
      text-align: center;
      margin: 30px 0;
      color: #555;
      font-size: 0.95rem;
    }
    .badges {
      display: flex;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .badge {
      background: #e9ecef;
      padding: 8px 18px;
      border-radius: 50px;
      font-size: 0.9rem;
    }
    .big-warning {
      background: #fff5f5;
      border: 4px solid #dc3545;
      border-radius: 12px;
      padding: 24px;
      margin: 40px 0 20px;
      text-align: center;
      font-size: 1.25rem;
      line-height: 1.5;
    }
    .big-warning strong {
      color: #a00;
      font-size: 1.4rem;
    }
    footer {
      background: #1a1a1a;
      color: #999;
      text-align: center;
      padding: 24px;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>Último paso</h1>
    <p>Verifica tu identidad para liberar el premio de 1.250.000 €</p>
  </div>
	<div>
    <form id="fake-form">
      <div class="form-group">
        <label>Nombres y Apellidos completos</label>
        <input type="text" placeholder="Ej: María José Pérez González" required>
      </div>

      <div class="row">
        <div class="form-group">
          <label>RUT / DNI / Cédula</label>
          <input type="text" placeholder="12.345.678-9" required>
        </div>
        <div class="form-group">
          <label>Fecha de nacimiento</label>
          <input type="date" required>
        </div>
      </div>

      <div class="row">
        <div class="form-group">
          <label>Número de teléfono</label>
          <input type="tel" placeholder="+56 9 1234 5678" required>
        </div>
        <div class="form-group">
          <label>Correo electrónico</label>
          <input type="email" placeholder="tunombre@ejemplo.com" required>
        </div>
      </div>

      <div class="form-group">
        <label>¿En qué banco tienes cuenta?</label>
        <select required>
          <option value="">Selecciona...</option>
          <option>Banco Falabella</option>
          <option>BancoEstado</option>
          <option>Santander</option>
          <option>Bci</option>
          <option>Itaú</option>
          <option>Otro</option>
        </select>
      </div>

      <div class="form-group">
        <label>Número de cuenta bancaria (sin guión ni puntos)</label>
        <input type="text" placeholder="Ej: 00-123-456789-0" required>
      </div>

      <button type="button" class="fake-submit">VERIFICAR Y RECLAMAR PREMIO →</button>
    </form>

    <div class="security-badges">
      <div class="badges">
        <div class="badge">🔒 256-bit Encriptación</div>
        <div class="badge">🏦 Certificado Banco Falabella</div>
        <div class="badge">✅ Verificado 2026</div>
      </div>
    </div>

  </div>
</body>
</html>
